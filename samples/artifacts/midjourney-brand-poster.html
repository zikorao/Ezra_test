<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><title>Brand Poster — Midjourney concept</title>
<style>
* { margin: 0; box-sizing: border-box; }
body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #1c1917; padding: 2rem; font-family: system-ui, sans-serif; }
.poster { width: 420px; aspect-ratio: 3/4; background: linear-gradient(145deg, #0d9488 0%, #134e4a 40%, #1c1917 100%); border-radius: 1rem; padding: 2.5rem; color: #fafaf9; display: flex; flex-direction: column; justify-content: flex-end; box-shadow: 0 24px 64px rgba(0,0,0,0.5); }
.label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.7; margin-bottom: 1rem; }
h1 { font-size: 2.5rem; line-height: 1.1; font-weight: 800; }
p { margin-top: 1rem; opacity: 0.85; font-size: 0.95rem; }
</style></head>
<body>
  <div class="poster">
    <span class="label">Midjourney concept · Campaign Q4</span>
    <h1>Ship AI work.<br />Not links.</h1>
    <p>Artifact Hub — publish, browse, review.</p>
  </div>
</body>
</html>
