<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><title>App Icons — Midjourney</title>
<style>
body { font-family: system-ui; background: #fafaf9; padding: 2rem; color: #1c1917; }
h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
.meta { color: #78716c; font-size: 0.85rem; margin-bottom: 1.5rem; }
.grid { display: grid; grid-template-columns: repeat(3, 120px); gap: 1.25rem; }
.icon { width: 120px; height: 120px; border-radius: 28px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.75rem; color: #fff; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.caption { text-align: center; font-size: 0.7rem; color: #78716c; margin-top: 0.35rem; }
</style></head>
<body>
<h1>App Icon Explorations</h1>
<p class="meta">Midjourney-style preview board · Artifact Hub mobile</p>
<div class="grid">
  <div><div class="icon" style="background:linear-gradient(135deg,#0d9488,#14b8a6)">AH</div><p class="caption">A — Teal gradient</p></div>
  <div><div class="icon" style="background:#1c1917;border:3px solid #0d9488">⬡</div><p class="caption">B — Hex outline</p></div>
  <div><div class="icon" style="background:#fff;color:#0d9488;border:2px solid #e7e5e4">📦</div><p class="caption">C — Light box</p></div>
  <div><div class="icon" style="background:linear-gradient(135deg,#44403c,#0d9488)">◆</div><p class="caption">D — Diamond</p></div>
  <div><div class="icon" style="background:#0f766e;border-radius:50%">AH</div><p class="caption">E — Circle</p></div>
  <div><div class="icon" style="background:#134e4a;font-size:2rem">✦</div><p class="caption">F — Spark</p></div>
</div>
